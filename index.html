<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz: Spanischer Subjuntivo – 30 Fragen</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --good: #16a34a;
      --bad: #dc2626;
      --warn: #f59e0b;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    header {
      background: var(--card);
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }
    h1 { margin: 0 0 8px; font-size: 2rem; }
    .subtitle { color: var(--muted); line-height: 1.5; }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-top: 18px;
    }
    .progress-wrap { flex: 1; min-width: 220px; }
    .progress-text { font-size: 0.95rem; color: var(--muted); margin-bottom: 6px; }
    .progress {
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }
    .bar { height: 100%; width: 0%; background: var(--primary); transition: width 0.3s; }
    button {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.08s, background 0.2s, opacity 0.2s;
      touch-action: manipulation;
    }
    button:active { transform: scale(0.98); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: #e0e7ff; color: #1e3a8a; }
    .btn-light { background: #f3f4f6; color: var(--text); }
    .card {
      background: var(--card);
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }
    .question-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .badge {
      background: #eef2ff;
      color: #3730a3;
      border-radius: 999px;
      padding: 7px 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .question { font-size: 1.28rem; line-height: 1.45; margin: 10px 0 18px; }
    .hint { color: var(--muted); font-size: 0.98rem; margin-top: -8px; margin-bottom: 16px; }
    .answers { display: grid; gap: 12px; }
    .answer {
      text-align: left;
      width: 100%;
      background: #f9fafb;
      border: 2px solid var(--border);
      color: var(--text);
      padding: 15px;
      border-radius: 16px;
      font-weight: 600;
    }
    .answer:hover { background: #f3f4f6; }
    .answer.correct { border-color: var(--good); background: #dcfce7; color: #14532d; }
    .answer.wrong { border-color: var(--bad); background: #fee2e2; color: #7f1d1d; }
    .answer:disabled { cursor: default; opacity: 1; }
    .feedback {
      margin-top: 16px;
      padding: 14px;
      border-radius: 16px;
      display: none;
      line-height: 1.5;
    }
    .feedback.good { display: block; background: #dcfce7; color: #14532d; }
    .feedback.bad { display: block; background: #fee2e2; color: #7f1d1d; }
    .nav { display: flex; justify-content: space-between; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
    .result {
      text-align: center;
      padding: 28px;
    }
    .score {
      font-size: 3rem;
      font-weight: 800;
      margin: 10px 0;
      color: var(--primary);
    }
    .summary-list {
      margin-top: 18px;
      text-align: left;
      display: grid;
      gap: 10px;
    }
    .summary-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: #f9fafb;
    }
    .summary-item strong { display: block; margin-bottom: 5px; }
    .hidden { display: none; }
    @media (max-width: 640px) {
      body { padding: 12px; }
      header, .card { padding: 18px; border-radius: 18px; }
      h1 { font-size: 1.55rem; }
      .question { font-size: 1.13rem; }
      button { width: 100%; }
      .question-top { flex-direction: column; }
      .badge { align-self: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Spanisch-Quiz: Subjuntivo</h1>
      <div class="subtitle">
        30 Fragen zum presente de subjuntivo: Formen, Auslöser und typische Satzstrukturen. Wähle jeweils die beste Antwort.
      </div>
      <div class="toolbar">
        <div class="progress-wrap">
          <div class="progress-text" id="progressText">Frage 1 von 30</div>
          <div class="progress"><div class="bar" id="bar"></div></div>
        </div>
        <button class="btn-secondary" onclick="restartQuiz()">Neu starten</button>
      </div>
    </header>

    <main id="quizCard" class="card">
      <div class="question-top">
        <div class="badge" id="category">Subjuntivo</div>
        <div class="badge" id="points">0 Punkte</div>
      </div>
      <div class="question" id="question"></div>
      <div class="hint" id="hint"></div>
      <div class="answers" id="answers"></div>
      <div class="feedback" id="feedback"></div>
      <div class="nav">
        <button class="btn-light" id="prevBtn" onclick="previousQuestion()">Zurück</button>
        <button class="btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>Weiter</button>
      </div>
    </main>

    <section id="resultCard" class="card result hidden">
      <h2>Ergebnis</h2>
      <div class="score" id="finalScore"></div>
      <p id="finalMessage"></p>
      <button class="btn-primary" onclick="restartQuiz()">Noch einmal spielen</button>
      <div class="summary-list" id="summaryList"></div>
    </section>
  </div>

  <script>
    const questions = [
      {
        category: "Formen",
        q: "Completa: Espero que tú ___ tiempo mañana.",
        hint: "Infinitiv: tener",
        answers: ["tienes", "tengas", "tendrás", "tuviste"],
        correct: 1,
        explanation: "Nach „Espero que …“ steht der Subjuntivo: tú tengas."
      },
      {
        category: "Formen",
        q: "Completa: Es importante que nosotros ___ la verdad.",
        hint: "Infinitiv: decir",
        answers: ["decimos", "digamos", "dijimos", "diremos"],
        correct: 1,
        explanation: "Nach unpersönlichen Ausdrücken wie „Es importante que …“ benutzt man den Subjuntivo: digamos."
      },
      {
        category: "Formen",
        q: "Completa: Quiero que mis amigos ___ a mi casa.",
        hint: "Infinitiv: venir",
        answers: ["vienen", "vengan", "vinieron", "vendrán"],
        correct: 1,
        explanation: "Wunsch + que + anderes Subjekt → Subjuntivo: vengan."
      },
      {
        category: "Auslöser",
        q: "Welche Verbindung verlangt hier den Subjuntivo? Me alegro de que tú ___ aquí.",
        hint: "Gefühl / Emotion",
        answers: ["estás", "estés", "estarás", "estuviste"],
        correct: 1,
        explanation: "Gefühle wie „Me alegro de que …“ lösen den Subjuntivo aus: estés."
      },
      {
        category: "Formen",
        q: "Completa: No creo que él ___ razón.",
        hint: "Infinitiv: tener",
        answers: ["tiene", "tenga", "tuvo", "tendrá"],
        correct: 1,
        explanation: "Verneinte Meinung: „No creo que …“ → Subjuntivo: tenga."
      },
      {
        category: "Indicativo oder Subjuntivo?",
        q: "Completa: Creo que María ___ muy simpática.",
        hint: "Achtung: nicht verneint!",
        answers: ["es", "sea", "fuera", "sería"],
        correct: 0,
        explanation: "„Creo que …“ bejaht eine Meinung. Deshalb steht hier normalerweise der Indicativo: es."
      },
      {
        category: "Formen",
        q: "Completa: Ojalá ___ buen tiempo el sábado.",
        hint: "Infinitiv: hacer",
        answers: ["hace", "haga", "hará", "hizo"],
        correct: 1,
        explanation: "Nach „Ojalá …“ steht sehr oft der Subjuntivo: haga."
      },
      {
        category: "Formen",
        q: "Completa: Es posible que ellos no ___ la respuesta.",
        hint: "Infinitiv: saber",
        answers: ["saben", "sepan", "supieron", "sabrán"],
        correct: 1,
        explanation: "Möglichkeit/Unsicherheit: „Es posible que …“ → Subjuntivo: sepan."
      },
      {
        category: "Formen",
        q: "Completa: Te recomiendo que ___ más despacio.",
        hint: "Infinitiv: hablar",
        answers: ["hablas", "hables", "hablaste", "hablarás"],
        correct: 1,
        explanation: "Empfehlung/Rat + que → Subjuntivo: hables."
      },
      {
        category: "Formen",
        q: "Completa: Mis padres quieren que yo ___ más.",
        hint: "Infinitiv: estudiar",
        answers: ["estudio", "estudie", "estudié", "estudiaré"],
        correct: 1,
        explanation: "Wunsch einer Person für eine andere Person → Subjuntivo: estudie."
      },
      {
        category: "Auslöser",
        q: "Completa: Es necesario que vosotros ___ puntuales.",
        hint: "Infinitiv: ser",
        answers: ["sois", "seáis", "fuisteis", "seréis"],
        correct: 1,
        explanation: "Notwendigkeit: „Es necesario que …“ → Subjuntivo: seáis."
      },
      {
        category: "Formen",
        q: "Completa: Dudo que Laura ___ hoy.",
        hint: "Infinitiv: llegar",
        answers: ["llega", "llegue", "llegó", "llegará"],
        correct: 1,
        explanation: "Zweifel: „Dudo que …“ → Subjuntivo: llegue."
      },
      {
        category: "Formen",
        q: "Completa: Busco un profesor que ___ francés y español.",
        hint: "Unbestimmte gesuchte Person",
        answers: ["habla", "hable", "habló", "hablará"],
        correct: 1,
        explanation: "Bei einer unbestimmten gesuchten Person steht oft Subjuntivo: que hable."
      },
      {
        category: "Indicativo oder Subjuntivo?",
        q: "Completa: Conozco a una profesora que ___ francés y español.",
        hint: "Diese Person existiert konkret.",
        answers: ["habla", "hable", "hablara", "haya hablado"],
        correct: 0,
        explanation: "Bei einer konkreten bekannten Person steht Indicativo: habla."
      },
      {
        category: "Formen",
        q: "Completa: Antes de que tú ___, llama a tu madre.",
        hint: "Infinitiv: salir",
        answers: ["sales", "salgas", "saliste", "saldrás"],
        correct: 1,
        explanation: "Nach „antes de que …“ steht Subjuntivo: salgas."
      },
      {
        category: "Formen",
        q: "Completa: Te llamo cuando ___ en casa.",
        hint: "Zukunftsbezug: wenn ich zu Hause bin",
        answers: ["estoy", "esté", "estuve", "estaba"],
        correct: 1,
        explanation: "Bei Zukunftsbezug nach „cuando“ steht Subjuntivo: esté."
      },
      {
        category: "Indicativo oder Subjuntivo?",
        q: "Completa: Siempre te llamo cuando ___ en casa.",
        hint: "Gewohnheit / regelmäßig",
        answers: ["estoy", "esté", "estuve", "estaré"],
        correct: 0,
        explanation: "Bei einer regelmäßigen Tatsache/Gewohnheit steht Indicativo: estoy."
      },
      {
        category: "Formen",
        q: "Completa: Aunque ___ difícil, voy a intentarlo.",
        hint: "Hier: Zugeständnis mit Unsicherheit / Möglichkeit",
        answers: ["es", "sea", "fue", "será"],
        correct: 1,
        explanation: "Wenn „aunque“ eine mögliche oder nicht sichere Situation ausdrückt, steht Subjuntivo: sea."
      },
      {
        category: "Formen",
        q: "Completa: Necesito que me ___ con este ejercicio.",
        hint: "Infinitiv: ayudar",
        answers: ["ayudas", "ayudes", "ayudaste", "ayudarás"],
        correct: 1,
        explanation: "Bedürfnis/Wunsch + que + anderes Subjekt → Subjuntivo: ayudes."
      },
      {
        category: "Formen",
        q: "Completa: No es verdad que los estudiantes ___ perezosos.",
        hint: "Infinitiv: ser",
        answers: ["son", "sean", "fueron", "serán"],
        correct: 1,
        explanation: "Verneinte Tatsachenbehauptung: „No es verdad que …“ → Subjuntivo: sean."
      },
      {
        category: "Indicativo oder Subjuntivo?",
        q: "Completa: Es verdad que los estudiantes ___ mucho.",
        hint: "Bejahte Tatsachenbehauptung",
        answers: ["trabajan", "trabajen", "trabajaran", "trabajarían"],
        correct: 0,
        explanation: "„Es verdad que …“ bejaht eine Tatsache → Indicativo: trabajan."
      },
      {
        category: "Formen",
        q: "Completa: Espero que ustedes ___ un buen viaje.",
        hint: "Infinitiv: tener",
        answers: ["tienen", "tengan", "tuvieron", "tendrán"],
        correct: 1,
        explanation: "Wunsch mit „Espero que …“ → Subjuntivo: tengan."
      },
      {
        category: "Formen",
        q: "Completa: Es mejor que no ___ tanto café.",
        hint: "Infinitiv: beber; Subjekt: tú",
        answers: ["bebes", "bebas", "bebiste", "beberás"],
        correct: 1,
        explanation: "Ratschlag/Bewertung: „Es mejor que …“ → Subjuntivo: bebas."
      },
      {
        category: "Formen",
        q: "Completa: Quiero que tú me ___ la verdad.",
        hint: "Infinitiv: decir",
        answers: ["dices", "digas", "dijiste", "dirás"],
        correct: 1,
        explanation: "Wunsch + que + anderes Subjekt → Subjuntivo: digas."
      },
      {
        category: "Formen",
        q: "Completa: Es raro que Ana no ___ aquí.",
        hint: "Infinitiv: estar",
        answers: ["está", "esté", "estuvo", "estará"],
        correct: 1,
        explanation: "Bewertung/Kommentar: „Es raro que …“ → Subjuntivo: esté."
      },
      {
        category: "Formen",
        q: "Completa: No pienso que la solución ___ fácil.",
        hint: "Infinitiv: ser",
        answers: ["es", "sea", "fue", "será"],
        correct: 1,
        explanation: "Verneinte Meinung: „No pienso que …“ → Subjuntivo: sea."
      },
      {
        category: "Formen",
        q: "Completa: Tal vez ___ al cine esta noche.",
        hint: "Subjekt: nosotros; Infinitiv: ir",
        answers: ["vamos", "vayamos", "fuimos", "iremos"],
        correct: 1,
        explanation: "„Tal vez“ kann Unsicherheit ausdrücken; hier passt der Subjuntivo: vayamos."
      },
      {
        category: "Formen",
        q: "Completa: Me sorprende que ellos ___ tan rápido.",
        hint: "Infinitiv: aprender",
        answers: ["aprenden", "aprendan", "aprendieron", "aprenderán"],
        correct: 1,
        explanation: "Gefühl/Reaktion: „Me sorprende que …“ → Subjuntivo: aprendan."
      },
      {
        category: "Formen",
        q: "Completa: Para que todos ___ bien, habla más alto.",
        hint: "Infinitiv: oír",
        answers: ["oyen", "oigan", "oyeron", "oirán"],
        correct: 1,
        explanation: "Absicht/Zweck: „para que …“ → Subjuntivo: oigan."
      },
      {
        category: "Formen",
        q: "Completa: No hay nadie que ___ ayudarte ahora.",
        hint: "Infinitiv: poder",
        answers: ["puede", "pueda", "pudo", "podrá"],
        correct: 1,
        explanation: "Nach negierten/unbestimmten Bezugswörtern wie „nadie que …“ steht Subjuntivo: pueda."
      }
    ];

    let current = 0;
    let score = 0;
    let answered = Array(questions.length).fill(null);

    const questionEl = document.getElementById('question');
    const hintEl = document.getElementById('hint');
    const answersEl = document.getElementById('answers');
    const feedbackEl = document.getElementById('feedback');
    const progressText = document.getElementById('progressText');
    const bar = document.getElementById('bar');
    const points = document.getElementById('points');
    const category = document.getElementById('category');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    const quizCard = document.getElementById('quizCard');
    const resultCard = document.getElementById('resultCard');
    const finalScore = document.getElementById('finalScore');
    const finalMessage = document.getElementById('finalMessage');
    const summaryList = document.getElementById('summaryList');

    function renderQuestion() {
      const item = questions[current];
      questionEl.textContent = item.q;
      hintEl.textContent = item.hint;
      category.textContent = item.category;
      progressText.textContent = `Frage ${current + 1} von ${questions.length}`;
      bar.style.width = `${((current + 1) / questions.length) * 100}%`;
      points.textContent = `${score} Punkte`;
      answersEl.innerHTML = '';
      feedbackEl.className = 'feedback';
      feedbackEl.textContent = '';
      nextBtn.disabled = answered[current] === null;
      nextBtn.textContent = current === questions.length - 1 ? 'Ergebnis anzeigen' : 'Weiter';
      prevBtn.disabled = current === 0;

      item.answers.forEach((answer, index) => {
        const btn = document.createElement('button');
        btn.className = 'answer';
        btn.textContent = answer;
        btn.onclick = () => chooseAnswer(index);
        if (answered[current] !== null) {
          btn.disabled = true;
          if (index === item.correct) btn.classList.add('correct');
          if (index === answered[current] && index !== item.correct) btn.classList.add('wrong');
        }
        answersEl.appendChild(btn);
      });

      if (answered[current] !== null) showFeedback(answered[current]);
    }

    function chooseAnswer(index) {
      if (answered[current] !== null) return;
      answered[current] = index;
      if (index === questions[current].correct) score++;
      renderQuestion();
    }

    function showFeedback(index) {
      const item = questions[current];
      const isCorrect = index === item.correct;
      feedbackEl.className = `feedback ${isCorrect ? 'good' : 'bad'}`;
      feedbackEl.innerHTML = `<strong>${isCorrect ? 'Richtig!' : 'Nicht ganz.'}</strong><br>${item.explanation}`;
      points.textContent = `${score} Punkte`;
    }

    function nextQuestion() {
      if (answered[current] === null) return;
      if (current < questions.length - 1) {
        current++;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function previousQuestion() {
      if (current > 0) {
        current--;
        renderQuestion();
      }
    }

    function showResult() {
      quizCard.classList.add('hidden');
      resultCard.classList.remove('hidden');
      finalScore.textContent = `${score} / ${questions.length}`;
      const percent = Math.round((score / questions.length) * 100);
      let message = '';
      if (percent >= 90) message = 'Sehr stark! Du beherrschst den Subjuntivo schon richtig gut.';
      else if (percent >= 70) message = 'Gut gemacht! Die Grundlagen sitzen, ein paar Auslöser kannst du noch wiederholen.';
      else if (percent >= 50) message = 'Ordentlich! Wiederhole besonders die Auslöser wie deseo, dudo, es importante que und para que.';
      else message = 'Das Thema braucht noch Übung. Schau dir vor allem die typischen Auslöser und die unregelmäßigen Formen an.';
      finalMessage.textContent = `${percent}% – ${message}`;

      summaryList.innerHTML = '<h3>Auswertung</h3>';
      questions.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'summary-item';
        const userAnswer = answered[i] === null ? 'nicht beantwortet' : item.answers[answered[i]];
        const rightAnswer = item.answers[item.correct];
        const ok = answered[i] === item.correct;
        div.innerHTML = `<strong>Frage ${i + 1}: ${ok ? '✅ richtig' : '❌ falsch'}</strong>
          Deine Antwort: ${userAnswer}<br>
          Richtige Antwort: ${rightAnswer}<br>
          <em>${item.explanation}</em>`;
        summaryList.appendChild(div);
      });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function restartQuiz() {
      current = 0;
      score = 0;
      answered = Array(questions.length).fill(null);
      resultCard.classList.add('hidden');
      quizCard.classList.remove('hidden');
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderQuestion();
  </script>
</body>
</html>
